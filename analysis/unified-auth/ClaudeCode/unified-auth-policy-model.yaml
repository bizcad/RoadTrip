# ---------------------------------------------------------------------------
# AUDIT & TELEMETRY
# ---------------------------------------------------------------------------

audit_policy:
  log_all_decisions: true
  log_format: "yaml"                  # yaml | json | structured-log
  log_destination: "logs/auth-decisions/"
  retain_days: 90
  enhanced_logging_actions:           # Actions that get extra detail
    - "git-push"
    - "deploy"
    - "publish"
    - "delete"
  include_in_log:
    - "principal_id"
    - "principal_type"
    - "trust_level"
    - "action"
    - "resource"
    - "delegation_chain"
    - "layers_evaluated"
    - "decision"
    - "risk_score"
    - "evaluation_time_ms"
    - "srcgeee_phase"

# ---------------------------------------------------------------------------
# ERROR MESSAGES (Extended from existing)
# ---------------------------------------------------------------------------

error_messages:
  IDENTITY_INVALID:
    message: "Principal '{principal_id}' failed identity verification"
    recovery: "Re-authenticate or check credential status"

  IDENTITY_EXPIRED:
    message: "Credentials for '{principal_id}' have expired"
    recovery: "Renew session (human), respawn agent, or rebuild code artifact"

  INSUFFICIENT_GROUP:
    message: "You are not in a group authorized for this skill"
    recovery: "Contact admin to be added to one of: {required_groups}"

  INSUFFICIENT_ROLE:
    message: "Role '{user_role}' is below minimum '{minimum_role}'"
    recovery: "Request a role promotion or contact admin"

  MFA_REQUIRED:
    message: "This skill requires multi-factor authentication"
    recovery: "Re-authenticate with MFA ({accepted_methods}) and try again"

  TOOL_BLOCKED:
    message: "Tool '{tool}' or path '{path}' is not permitted"
    recovery: "Check allowed paths in policy or use an alternative tool"

  RESOURCE_PROTECTED:
    message: "Resource '{resource}' is protected"
    recovery: "Use the alternative workflow: {suggested_alternative}"

  DELEGATION_MISSING:
    message: "Agent '{principal_id}' has no active delegation for this action"
    recovery: "Request delegation from a human principal"

  DELEGATION_EXPIRED:
    message: "Delegation expired at {expiry}"
    recovery: "Request a new delegation from the grantor"

  DELEGATION_SCOPE_EXCEEDED:
    message: "Action '{action}' on '{resource}' is outside delegation scope"
    recovery: "Request expanded delegation or use an authorized resource"

  HITL_REQUIRED:
    message: "Risk score {risk_score} exceeds threshold. Human approval required."
    recovery: "A human must approve this action before it can proceed"

  UNSIGNED_CODE:
    message: "Code artifact '{principal_id}' is not signed"
    recovery: "Sign the artifact with cosign or GPG and rebuild"

